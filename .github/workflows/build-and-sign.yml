name: Build and Sign Extension

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'New extension version (e.g. 12.0). Leave empty for scheduled runs to auto-increment.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-sign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install web-ext
        run: bun install -g web-ext

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(jq -r '.version' manifest.json)
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            NEXT=$((MAJOR + 1)).0
            echo "value=$NEXT" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump manifest version
        run: |
          jq --arg ver "${{ steps.version.outputs.value }}" '.version = $ver' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json

      - name: Build and sign extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
          WEB_EXT_CHANNEL: ${{ secrets.WEB_EXT_CHANNEL }}
        run: bun run linkumori-cli-tool.js build-and-sign

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linkumori-${{ steps.version.outputs.value }}
          path: web-ext-artifacts/

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release ${{ steps.version.outputs.value }}"
          git push

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          printf '%s\n\n%s\n' \
            "Release v${{ steps.version.outputs.value }} of Linkumori (Clean URLs) Firefox Extension." \
            "Get the signed extension from the Firefox Add-ons store: https://addons.mozilla.org/en-US/firefox/addon/linkumori-clean-urls/" \
            > release-notes.txt
          gh release create "v${{ steps.version.outputs.value }}" \
            web-ext-artifacts/* \
            --title "Linkumori v${{ steps.version.outputs.value }}" \
            --notes-file release-notes.txt \
            --latest
